name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Compilar APK de ObraCalc MX
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: Correr tests
        run: npx vitest run

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Compilar APK (modo debug)
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Renombrar APK
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          NEW_NAME="obracalc-mx-${DATE}-${SHORT_SHA}.apk"
          cp "$APK_PATH" "$NEW_NAME"
          echo "APK_NAME=$NEW_NAME" >> $GITHUB_ENV

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: obracalc-mx-apk
          path: ${{ env.APK_NAME }}
          retention-days: 30
